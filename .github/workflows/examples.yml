name: Examples

on:
  push:
    branches: [main]
    paths:
      - "examples/**"
      - "scripts/pack-example.sh"
      - ".github/workflows/examples.yml"
  pull_request:
    branches: [main]
    paths:
      - "examples/**"
      - "scripts/pack-example.sh"
      - ".github/workflows/examples.yml"

permissions:
  contents: read

jobs:
  pack-and-compare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rebuild must match committed tarball
        run: |
          test -f examples/dist/hello-skill-0.1.0.tar.gz
          cp examples/dist/hello-skill-0.1.0.tar.gz /tmp/hello-skill-0.1.0.committed.tar.gz
          chmod +x scripts/pack-example.sh
          scripts/pack-example.sh
          cmp -s /tmp/hello-skill-0.1.0.committed.tar.gz examples/dist/hello-skill-0.1.0.tar.gz || {
            echo "examples/dist/hello-skill-0.1.0.tar.gz does not match scripts/pack-example.sh output — rebuild and commit."
            exit 1
          }
          tar -tzf examples/dist/hello-skill-0.1.0.tar.gz | grep -qx SKILL.md
