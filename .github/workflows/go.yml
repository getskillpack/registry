name: Go

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  e2e-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: getskillpack/cli
          path: cli
          # Private repo: default GITHUB_TOKEN cannot read other repos in the org.
          token: ${{ secrets.GETSKILLPACK_ORG_PAT }}
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: skillget ↔ registry smoke
        env:
          SKILLGET_SRC: ${{ github.workspace }}/cli
        run: bash scripts/e2e-smoke.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Format
        run: test -z "$(gofmt -l .)"
      - name: Test
        run: |
          go vet ./...
          go test ./... -count=1
      - name: Root README English-only (getskillpack org)
        run: |
          python3 << 'PY'
          import pathlib
          import re
          import sys

          text = pathlib.Path("README.md").read_text(encoding="utf-8")
          if re.search(r"[А-Яа-яЁё]", text):
              print(
                  "Root README must be English-only (Cyrillic not allowed). "
                  "See docs/ORG_README_POLICY.md"
              )
              sys.exit(1)
          PY
